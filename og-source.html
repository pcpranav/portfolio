<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0a0f14;
    color: #e6f1f5;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  /* matching the hero radial gradients */
  body::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 18% -5%, rgba(0,229,199,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 100% 100%, rgba(196,201,212,0.08) 0%, transparent 55%);
  }
  .frame {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    padding: 64px 80px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top {
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 22px; font-weight: 800;
    color: #c4c9d4; letter-spacing: -0.02em;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #00e5c7;
    border: 1px solid rgba(0,229,199,0.35);
    background: rgba(0,229,199,0.08);
    padding: 8px 16px; border-radius: 6px;
    backdrop-filter: blur(8px);
  }
  .badge::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #00e5c7; box-shadow: 0 0 12px rgba(0,229,199,0.6);
  }
  .center { display: flex; flex-direction: column; gap: 22px; }
  h1 {
    font-size: 124px; font-weight: 800;
    letter-spacing: -0.045em; line-height: 0.98;
  }
  h1 .accent {
    background: linear-gradient(135deg, #00e5c7 20%, #c4c9d4 80%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .role {
    font-size: 30px; font-weight: 500;
    color: #9aa5b1; letter-spacing: -0.01em;
  }
  .role b { color: #e6f1f5; font-weight: 600; }
  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 16px; color: #6b7785; letter-spacing: 0.02em;
  }
  .bottom .url { color: #9aa5b1; }
  .rule {
    width: 60px; height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, #00e5c7, #c4c9d4);
    margin-bottom: 6px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top">
      <div class="logo">PC</div>
      <div class="badge">Senior Software Engineer · Backend</div>
    </div>
    <div class="center">
      <div class="rule"></div>
      <h1>Pranav <span class="accent">Chandra</span></h1>
      <div class="role">Building <b>scalable systems</b> &amp; <b>AI-powered products</b> at LiftOff LLC</div>
    </div>
    <div class="bottom">
      <span class="url">pranavchandra-portfolio.vercel.app</span>
      <span>Python · Node.js · GraphQL · AWS · GCP · LLMs</span>
    </div>
  </div>
</body>
</html>
